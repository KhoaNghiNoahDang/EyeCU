name: EyeCU Backend CI/CD Pipeline

# ================================================================
# Tự động chạy khi có Push hoặc Pull Request vào nhánh main/develop
# ================================================================
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# ================================================================
# Biến môi trường dùng chung cho toàn bộ pipeline
# ================================================================
env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ================================================================
# JOB 1: Kiểm tra Backend (Lint + Unit Test)
# ================================================================
jobs:
  backend-ci:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest

    # Khởi tạo PostgreSQL ảo để test (mirror với môi trường production)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eyecu_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      # 1. Checkout code
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      # 2. Cài Python
      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      # 3. Cài thư viện
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sqlmodel  # Bổ sung sqlmodel bị thiếu trong requirements.txt
          pip install flake8 black pytest pytest-asyncio httpx

      # ─── BƯỚC 1: DEPENDENCY CHECK ───────────────────────────────
      - name: 🔗 Dependency Compatibility Check
        run: |
          echo "✅ Checking for conflicting package versions..."
          pip check
          echo "📋 Installed packages:"
          pip list

      # ─── BƯỚC 2: LINTER ─────────────────────────────────────────
      - name: 🧹 Lint — Flake8 (Critical Errors Only)
        run: |
          echo "🔍 Running Flake8 — chỉ bắt lỗi nghiêm trọng (syntax, undefined names)..."
          flake8 app/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: 🎨 Format Check — Black (PEP8 Style)
        run: |
          echo "🔍 Checking code formatting với Black..."
          black --check --diff app/

      # ─── BƯỚC 3: UNIT TEST ──────────────────────────────────────
      - name: 🧪 Run Unit Tests (Pytest)
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/eyecu_test_db
          SECRET_KEY: ci_test_secret_key_not_for_production
          VNPT_EKYC_TOKEN_ID: ""
          VNPT_EKYC_TOKEN_KEY: ""
          VNPT_EKYC_ACCESS_TOKEN: ""
          VNPT_SMARTVISION_TOKEN_ID: ""
          VNPT_SMARTVISION_TOKEN_KEY: ""
          VNPT_SMARTVISION_ACCESS_TOKEN: ""
          VNPT_VNFACE_ACCESS_TOKEN: ""
        run: |
          echo "🧪 Running Pytest..."
          pytest tests/ -v --tb=short || exit_code=$?
          # Exit code 5 = "No tests collected" — bỏ qua, không block team
          if [ "$exit_code" = "5" ]; then
            echo "⚠️ Chưa có test cases — Bỏ qua lỗi này."
            exit 0
          elif [ ! -z "$exit_code" ] && [ "$exit_code" != "0" ]; then
            echo "❌ Test thất bại! Anh em check lại code ngay!"
            exit $exit_code
          fi

# ================================================================
# JOB 2: Kiểm tra Frontend (Lint + Build)
# ================================================================
  frontend-ci:
    name: ⚛️ Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      # Dùng Node + npm (project có cả package-lock.json lẫn bun.lock)
      - name: 🟢 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: npm ci --prefer-offline

      - name: 🧹 Lint Frontend (ESLint)
        run: |
          echo "🔍 Running ESLint..."
          npm run lint

      - name: 🏗️ Build Frontend (Type Check + Vite Build)
        run: |
          echo "🏗️ Building production bundle..."
          npm run build

# ================================================================
# JOB 3: Build & Push Docker (chỉ chạy khi merge vào main)
# ================================================================
  docker-build:
    name: 🐳 Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    # Chỉ chạy khi push lên nhánh main (không chạy trên PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      # Bật Docker Buildx (build nhanh hơn, hỗ trợ multi-platform)
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Đăng nhập vào Docker Hub (cần thêm DOCKER_USERNAME, DOCKER_TOKEN vào GitHub Secrets)
      # - name: 🔐 Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🐳 Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false  # Đổi thành true khi đã cấu hình Docker Hub secrets
          tags: eyecu-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false  # Đổi thành true khi đã cấu hình Docker Hub secrets
          tags: eyecu-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
