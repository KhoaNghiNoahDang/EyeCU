name: EyeCU Backend CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-ci:
    name: Backend - Lint and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eyecu_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sqlmodel
          pip install flake8 black pytest pytest-asyncio httpx

      - name: Dependency Compatibility Check
        run: |
          echo "Checking for conflicting package versions..."
          pip check
          echo "Installed packages:"
          pip list

      - name: Lint - Flake8 (Critical Errors Only)
        run: |
          echo "Running Flake8..."
          flake8 app/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Format Check - Black (PEP8 Style)
        run: |
          echo "Checking code formatting with Black..."
          black --check --diff app/

      - name: Run Unit Tests (Pytest)
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/eyecu_test_db
          SECRET_KEY: ci_test_secret_key_not_for_production
          VNPT_EKYC_TOKEN_ID: ""
          VNPT_EKYC_TOKEN_KEY: ""
          VNPT_EKYC_ACCESS_TOKEN: ""
          VNPT_SMARTVISION_TOKEN_ID: ""
          VNPT_SMARTVISION_TOKEN_KEY: ""
          VNPT_SMARTVISION_ACCESS_TOKEN: ""
          VNPT_VNFACE_ACCESS_TOKEN: ""
        run: |
          echo "Running Pytest..."
          pytest tests/ -v --tb=short || exit_code=$?
          if [ "$exit_code" = "5" ]; then
            echo "No test cases - Skipping this error."
            exit 0
          elif [ ! -z "$exit_code" ] && [ "$exit_code" != "0" ]; then
            echo "Test failed!"
            exit $exit_code
          fi

  frontend-ci:
    name: Frontend - Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci --prefer-offline

      - name: Lint Frontend (ESLint)
        run: |
          echo "Running ESLint..."
          npm run lint

      - name: Build Frontend
        run: |
          echo "Building production bundle..."
          npm run build

  docker-build:
    name: Docker - Build and Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: eyecu-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: eyecu-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
