services:
  - type: web
    name: eyecu-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: eyecu-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: eyecu-db
    databaseName: eyecu
    user: eyecu_admin
