version: "3.9"

services:
  # ── BACKEND (FastAPI) ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: eyecu_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Hot-reload: sửa code là tự reload ngay
    env_file:
      - ./backend/.env
      # Bỏ override DATABASE_URL ở đây để container nhận biến này từ backend/.env (trỏ tới Supabase)
    depends_on: []
    restart: unless-stopped

  # ── FRONTEND (React/Vite) ──────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: eyecu_frontend
    ports:
      - "5173:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules        # Giữ node_modules trong container, không mount từ host
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
