version: "3.9"

services:
  # ── BACKEND (FastAPI) ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: eyecu_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Hot-reload: sửa code là tự reload ngay
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./eyecu.db   # Dùng SQLite cho local (không cần cài PostgreSQL)
    depends_on: []
    restart: unless-stopped

  # ── FRONTEND (React/Vite) ──────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: eyecu_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules        # Giữ node_modules trong container, không mount từ host
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
