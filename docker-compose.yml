services:
  # ── BACKEND (FastAPI + Uvicorn) ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyecu_backend
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: thay đổi code Python → uvicorn tự reload
      - ./backend:/app
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── FRONTEND (Vite Dev Server) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eyecu_frontend
    ports:
      - "5173:5173"
    volumes:
      # Hot-reload: thay đổi code React → Vite tự reload
      - ./frontend:/app
      # Giữ node_modules bên trong container, không ghi đè từ host Windows
      - /app/node_modules
    environment:
      # Backend chạy trên host machine port 8000
      - VITE_API_URL=http://localhost:8000/api
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    tty: true
    stdin_open: true
    restart: unless-stopped

